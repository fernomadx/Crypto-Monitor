name: Deploy Kronos to VPS

on:
  workflow_dispatch:
    inputs:
      vps_host:
        description: "IPv4 Hetzner (opcional se secret VPS_HOST existir)"
        required: false
        type: string

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          INPUT_HOST: ${{ github.event.inputs.vps_host }}
        if: env.VPS_HOST != '' || env.INPUT_HOST != ''
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ github.event.inputs.vps_host || secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER || 'root' }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script_stop: true
          script: |
            set -e
            export REPO_DIR=/opt/crypto-monitor
            export KRONOS_DIR=/opt/Kronos
            git clone https://github.com/fernomadx/Crypto-Monitor.git "$REPO_DIR" 2>/dev/null || true
            cd "$REPO_DIR" && git pull origin main
            if [ -x "$REPO_DIR/vps/.venv/bin/pip" ]; then
              "$REPO_DIR/vps/.venv/bin/pip" install -r vps/requirements-railway.txt -q
            fi
            chmod +x vps/hetzner_test.sh scripts/hetzner-bootstrap-test.sh
            bash vps/hetzner_test.sh --score

      - name: VPS secrets missing
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          INPUT_HOST: ${{ github.event.inputs.vps_host }}
        if: env.VPS_HOST == '' && env.INPUT_HOST == ''
        run: |
          echo "::error::Configure VPS_HOST secret ou informe vps_host no Run workflow."
          echo "Guia: scripts/setup-vps-github-secrets.md"
          echo "Teste manual: curl -fsSL https://raw.githubusercontent.com/fernomadx/Crypto-Monitor/main/scripts/hetzner-bootstrap-test.sh | sudo bash"
          exit 1
