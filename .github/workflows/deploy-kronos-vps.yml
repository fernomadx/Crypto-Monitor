name: Disable Kronos on VPS

on:
  workflow_dispatch:
    inputs:
      vps_host:
        description: "IPv4 Hetzner (opcional se secret VPS_HOST existir)"
        required: false
        type: string
  push:
    branches: [main]
    paths:
      - vps/hetzner_disable_kronos.sh
      - .github/workflows/deploy-kronos-vps.yml

jobs:
  disable:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Disable Kronos via SSH
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          INPUT_HOST: ${{ github.event.inputs.vps_host }}
        if: env.VPS_HOST != '' || env.INPUT_HOST != ''
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ github.event.inputs.vps_host || secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER || 'root' }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script_stop: true
          script: |
            set -e
            export REPO_DIR=/opt/crypto-monitor
            if [ -d "$REPO_DIR/.git" ]; then
              cd "$REPO_DIR" && git pull origin main
              chmod +x vps/hetzner_disable_kronos.sh vps/hetzner_test.sh
              bash vps/hetzner_disable_kronos.sh
              bash vps/hetzner_test.sh
            else
              curl -fsSL https://raw.githubusercontent.com/fernomadx/Crypto-Monitor/main/vps/hetzner_disable_kronos.sh | bash
            fi

      - name: VPS secrets missing
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          INPUT_HOST: ${{ github.event.inputs.vps_host }}
        if: env.VPS_HOST == '' && env.INPUT_HOST == ''
        run: |
          echo "::error::Configure VPS_HOST secret ou informe vps_host no Run workflow."
          echo "Ou na Console Hetzner: curl -fsSL https://raw.githubusercontent.com/fernomadx/Crypto-Monitor/main/vps/hetzner_disable_kronos.sh | sudo bash"
          exit 1
