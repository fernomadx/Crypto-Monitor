# Redeploy Railway (opcional — requer secret RAILWAY_TOKEN)
# Sem token: Railway redeploya sozinho se repo está conectado no painel.

name: Railway Deploy

on:
  push:
    branches: [main]
    paths:
      - 'lib/**'
      - 'vps/**'
      - 'Dockerfile'
      - 'crontab'
      - 'railway.toml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    container: ghcr.io/railwayapp/cli:latest
    steps:
      - uses: actions/checkout@v4

      - name: Set QUANT variables (se secrets existirem)
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          LLMQUANT_API_KEY: ${{ secrets.LLMQUANT_API_KEY }}
        run: |
          if [ -z "$RAILWAY_TOKEN" ] || [ -z "$LLMQUANT_API_KEY" ]; then
            echo "::notice::LLMQUANT_API_KEY/RAILWAY_TOKEN ausentes — defina LLMQUANT_API_KEY no painel Railway."
            exit 0
          fi
          railway variable set \
            "LLMQUANT_API_KEY=$LLMQUANT_API_KEY" \
            QUANT_KRONOS_MODE=warn \
            QUANT_STATE_PATH=/data/quant_state.json \
            QUANT_IMPACT_THRESHOLD=0.65 \
            QUANT_MAX_AGE_HOURS=4
          echo "::notice::Variáveis QUANT configuradas no Railway"

      - name: Deploy via Railway CLI
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_SERVICE_ID: ${{ secrets.RAILWAY_SERVICE_ID }}
        run: |
          if [ -z "$RAILWAY_TOKEN" ]; then
            echo "::notice::RAILWAY_TOKEN não configurado — confie no auto-deploy do GitHub ou adicione o secret."
            exit 0
          fi
          if [ -n "$RAILWAY_SERVICE_ID" ]; then
            railway up --ci --service="$RAILWAY_SERVICE_ID"
          else
            railway up --ci
          fi
