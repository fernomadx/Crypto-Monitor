# Publica arquivo-kronos/ no GitHub Pages (acesso web)
# URL: https://fernomadx.github.io/Crypto-Monitor/

name: Arquivo Kronos — GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'arquivo-kronos/**'
      - '.github/workflows/arquivo-kronos-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  sync-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Sync código para arquivo-kronos
        run: bash arquivo-kronos/sync-from-repo.sh

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: arquivo-kronos

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
